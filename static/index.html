<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Summarizer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e8e8e0; font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .container { max-width: 680px; width: 100%; }
  h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.4rem; color: #fff; }
  h1 span { color: #a78bfa; }
  .subtitle { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: #555; margin-bottom: 3rem; letter-spacing: 0.05em; }
  .upload-zone { border: 1.5px dashed #2a2a2a; border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #111; margin-bottom: 1.5rem; position: relative; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #a78bfa; background: #15101f; }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
  .upload-text { font-size: 1rem; color: #888; margin-bottom: 0.5rem; }
  .upload-text strong { color: #a78bfa; cursor: pointer; }
  .upload-hint { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #444; }
  .file-selected { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: #a78bfa; margin-top: 1rem; }
  .selects-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .language-select { width: 100%; padding: 0.75rem 1rem; background: #111; border: 1.5px solid #2a2a2a; border-radius: 12px; color: #e8e8e0; font-family: 'DM Mono', monospace; font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s; }
  .language-select:focus { outline: none; border-color: #a78bfa; }
  .btn { width: 100%; padding: 1rem; background: #a78bfa; color: #0d0d0d; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; letter-spacing: 0.02em; }
  .btn:hover { background: #c4b5fd; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
  .result { margin-top: 2rem; background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 2rem; display: none; }
  .result.show { display: block; }
  .result-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #1e1e1e; }
  .result-filename { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: #555; }
  .result-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #a78bfa; background: #1a1025; padding: 0.3rem 0.75rem; border-radius: 999px; }
  .copy-btn { margin-left: auto; padding: 0.4rem 1rem; background: transparent; border: 1px solid #a78bfa; color: #a78bfa; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: #a78bfa; color: #0d0d0d; }
  .copy-btn.copied { border-color: #4ade80; color: #4ade80; }
  .summary-text { font-size: 0.95rem; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
  .cursor { display: inline-block; width: 2px; height: 1em; background: #a78bfa; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: text-bottom; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .loader { display: none; text-align: center; padding: 2rem; }
  .loader.show { display: block; }
  .loader-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 1rem; }
  .loader-dots span { width: 8px; height: 8px; background: #a78bfa; border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  .loader-text { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: #555; }
  .error { margin-top: 1rem; padding: 1rem 1.25rem; background: #1a0f0f; border: 1px solid #3a1515; border-radius: 12px; color: #f87171; font-family: 'DM Mono', monospace; font-size: 0.8rem; display: none; }
  .error.show { display: block; }
  .pdf-info { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .info-badge { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #888; background: #161616; border: 1px solid #2a2a2a; padding: 0.4rem 0.75rem; border-radius: 8px; }
  .info-badge span { color: #a78bfa; margin-right: 0.4rem; }
</style>
</head>
<body>
<div class="container">
  <h1>PDF <span>Summarizer</span></h1>
  <p class="subtitle">// powered by groq + mistral ocr</p>

  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf">
    <span class="upload-icon">📄</span>
    <p class="upload-text">Drop your PDF here or <strong onclick="document.getElementById('fileInput').click()">browse</strong></p>
    <p class="upload-hint">only .pdf files accepted</p>
    <p class="file-selected" id="fileName"></p>
  </div>

  <div class="selects-row">
    <select class="language-select" id="languageSelect">
      <option value="English">🇬🇧 English</option>
      <option value="Greek">🇬🇷 Greek</option>
      <option value="Spanish">🇪🇸 Spanish</option>
      <option value="French">🇫🇷 French</option>
      <option value="German">🇩🇪 German</option>
      <option value="Italian">🇮🇹 Italian</option>
    </select>

    <select class="language-select" id="styleSelect">
      <option value="bullet">📋 Bullet Points</option>
      <option value="paragraph">📝 Paragraph</option>
      <option value="executive">💼 Executive Summary</option>
      <option value="eli5">🧒 ELI5</option>
    </select>
  </div>

  <button class="btn" id="submitBtn" disabled onclick="summarize()">Summarize</button>

  <div class="error" id="errorBox"></div>

  <div class="loader" id="loader">
    <div class="loader-dots"><span></span><span></span><span></span></div>
    <p class="loader-text">analyzing your document...</p>
  </div>

  <div class="result" id="result">
    <div class="pdf-info" id="pdfInfo">
      <div class="info-badge"><span>📄</span><span id="infoPages"></span></div>
      <div class="info-badge"><span>💾</span><span id="infoSize"></span></div>
      <div class="info-badge"><span>🔤</span><span id="infoType"></span></div>
    </div>
    <div class="result-header">
      <span class="result-label">Summary</span>
      <span class="result-filename" id="resultFilename"></span>
      <button class="copy-btn" id="copyBtn" onclick="copySummary()">Copy</button>
      <button class="copy-btn" onclick="downloadSummary()">Download</button>
    </div>
    <p class="summary-text" id="summaryText"></p>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const submitBtn = document.getElementById('submitBtn');
  const fileName = document.getElementById('fileName');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = '→ ' + fileInput.files[0].name;
      submitBtn.disabled = false;
    }
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.pdf')) {
      fileInput.files = e.dataTransfer.files;
      fileName.textContent = '→ ' + file.name;
      submitBtn.disabled = false;
    }
  });

  async function summarize() {
    const file = fileInput.files[0];
    if (!file) return;

    document.getElementById('result').classList.remove('show');
    document.getElementById('errorBox').classList.remove('show');
    document.getElementById('loader').classList.add('show');
    document.getElementById('summaryText').textContent = '';
    submitBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', file);
    const language = document.getElementById('languageSelect').value;
    formData.append('language', language);
    const style = document.getElementById('styleSelect').value;
    formData.append('style', style);

    try {
      const res = await fetch('/summarize', { method: 'POST', body: formData });

      if (!res.ok) {
        const data = await res.json();
        document.getElementById('loader').classList.remove('show');
        const errorBox = document.getElementById('errorBox');
        errorBox.textContent = '✗ ' + (data.detail || 'Something went wrong.');
        errorBox.classList.add('show');
        submitBtn.disabled = false;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      const summaryEl = document.getElementById('summaryText');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const json = JSON.parse(line.slice(6));

          if (json.type === 'info') {
            document.getElementById('loader').classList.remove('show');
            document.getElementById('resultFilename').textContent = json.filename;
            document.getElementById('infoPages').textContent = json.data.pages + ' pages';
            document.getElementById('infoSize').textContent = json.data.size;
            document.getElementById('infoType').textContent = json.data.type;
            document.getElementById('result').classList.add('show');
            summaryEl.appendChild(cursor);
          } else if (json.type === 'token') {
            summaryEl.insertBefore(document.createTextNode(json.data), cursor);
          } else if (json.type === 'done') {
            cursor.remove();
          }
        }
      }
    } catch (err) {
      document.getElementById('loader').classList.remove('show');
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = '✗ Could not connect to the server.';
      errorBox.classList.add('show');
    }

    submitBtn.disabled = false;
  }

  function copySummary() {
    const text = document.getElementById('summaryText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function downloadSummary() {
    const text = document.getElementById('summaryText').textContent;
    const filename = document.getElementById('resultFilename').textContent;
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.replace('.pdf', '_summary.txt');
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
