<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Summarizer — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #111;
    --surface2: #161616;
    --border: #2a2a2a;
    --accent: #a78bfa;
    --accent-light: #c4b5fd;
    --accent-dim: #1a1025;
    --text: #e8e8e0;
    --text-muted: #888;
    --text-dim: #444;
    --success: #4ade80;
    --error: #f87171;
    --error-bg: #1a0f0f;
    --error-border: #3a1515;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.03em;
    margin-bottom: 0.4rem;
  }

  .logo span { color: var(--accent); }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 0.6rem;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #0d0d0d;
  }

  /* ── FORM ── */
  .form { display: none; }
  .form.active { display: block; }

  .form-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.45rem;
  }

  input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }

  /* ── BUTTON ── */
  .btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
    margin-top: 0.5rem;
  }

  .btn:hover { background: var(--accent-light); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: var(--border); color: #555; cursor: not-allowed; }

  /* ── MESSAGES ── */
  .error-msg {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 10px;
    color: var(--error);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    display: none;
  }

  .error-msg.show { display: block; }

  .success-msg {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: #0f1a0f;
    border: 1px solid #1a3a1a;
    border-radius: 10px;
    color: var(--success);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    display: none;
  }

  .success-msg.show { display: block; }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  /* ── LOADER ── */
  .btn-loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #0d0d0d;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">PDF <span>Summarizer</span></div>
    <div class="logo-sub">// powered by groq · mistral · langchain</div>
  </div>

  <div class="card">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form active" id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
      <div class="error-msg" id="loginError"></div>
      <div class="success-msg" id="loginSuccess"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form" id="registerForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="min. 6 characters" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="registerConfirm" placeholder="••••••••" />
      </div>
      <button class="btn" id="registerBtn" onclick="register()">Create Account</button>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
    </div>

  </div>

  <div class="footer">
    By signing up you agree to our terms of service
  </div>

</div>

<script>
  // ── CHECK IF ALREADY LOGGED IN ──
  if (localStorage.getItem('access_token')) {
    window.location.href = '/';
  }

  // ── TABS ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginForm').classList.contains('active');
      if (loginActive) login();
      else register();
    }
  });

  // ── LOGIN ──
  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');
    const successEl = document.getElementById('loginSuccess');

    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    if (!email || !password) {
      errorEl.textContent = '✗ Please fill in all fields.';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span> Signing in...';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = '✗ ' + (data.detail || 'Login failed.');
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      // Save token and redirect
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('user_email', data.user);
      successEl.textContent = '✓ Welcome back! Redirecting...';
      successEl.classList.add('show');
      setTimeout(() => window.location.href = '/', 1000);

    } catch (err) {
      errorEl.textContent = '✗ Could not connect to server.';
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // ── REGISTER ──
  async function register() {
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('registerConfirm').value;
    const btn = document.getElementById('registerBtn');
    const errorEl = document.getElementById('registerError');
    const successEl = document.getElementById('registerSuccess');

    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    if (!email || !password || !confirm) {
      errorEl.textContent = '✗ Please fill in all fields.';
      errorEl.classList.add('show');
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = '✗ Password must be at least 6 characters.';
      errorEl.classList.add('show');
      return;
    }

    if (password !== confirm) {
      errorEl.textContent = '✗ Passwords do not match.';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span> Creating account...';

    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = '✗ ' + (data.detail || 'Registration failed.');
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      successEl.textContent = '✓ Account created! Check your email to confirm.';
      successEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';

    } catch (err) {
      errorEl.textContent = '✗ Could not connect to server.';
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
